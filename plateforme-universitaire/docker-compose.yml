version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: plateforme_mysql
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: plateforme_universitaire
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - plateforme_net

  elasticsearch:
    image: elasticsearch:8.13.0
    container_name: plateforme_elasticsearch
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - ES_JAVA_OPTS=-Xms512m -Xmx512m
    ports:
      - "9200:9200"
    volumes:
      - es_data:/usr/share/elasticsearch/data
    networks:
      - plateforme_net

  kibana:
    image: kibana:8.13.0
    container_name: plateforme_kibana
    environment:
      - ELASTICSEARCH_HOSTS=http://elasticsearch:9200
    ports:
      - "5601:5601"
    depends_on:
      - elasticsearch
    networks:
      - plateforme_net

volumes:
  mysql_data:
  es_data:

networks:
  plateforme_net:
    driver: bridge
